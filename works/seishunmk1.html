<script src="../js/scrollplayback.js"></script>

<script>

function scrollFunction() {
  if (document.body.scrollTop > 20) {
    document.getElementById("topbtn").style.display = "block";
  } else {
    document.getElementById("topbtn").style.display = "none";
  }
}

scrollContainer.addEventListener('scroll', scrollFunction);


document.addEventListener('DOMContentLoaded', () => {
        setInterval(() => {
            scrollFunction();
        }, 100);
    });
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js" referrerpolicy="no-referrer"></script>
<script>

    document.addEventListener('DOMContentLoaded', () => {
    var animation = lottie.loadAnimation({
        container: document.getElementById('animationContainer'), // the dom element
        renderer: 'svg',
        loop: 2,
        autoplay: true,
        path: '../images/raw/glassvoice/arrow.json' // the path to the animation json
    });

    animation.addEventListener('complete', () => {
        document.getElementById('animationContainer').style.display = 'none';
    });
});
</script>
