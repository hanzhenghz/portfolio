<script>
    document.addEventListener('DOMContentLoaded', function() {
        var videoElement = document.getElementById('gross');
        var sourceElement = document.createElement('source');

        sourceElement.setAttribute('src', 'https://file.uhsea.com/2407/96f197e93ef1705090d797d688f384baIP.webm');
        sourceElement.setAttribute('type', 'video/webm');

        videoElement.appendChild(sourceElement);

        // Load the video as soon as the source is set
        videoElement.load();

        // Optional: Play the video automatically once it can play through
        // Note: Autoplay policies might require the video to be muted
        videoElement.muted = true;
        videoElement.addEventListener('canplaythrough', function() {
            this.play();
        }, false);
    });
    </script>
