<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
</head>
<body>

    <div style="height: 100%; width: 100%; background-color: blueviolet;">
        <div id="animationContainer"></div>
    </div>
    


</body>


<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js" referrerpolicy="no-referrer"></script>
<script>

    document.addEventListener('DOMContentLoaded', () => {
    var animation = lottie.loadAnimation({
        container: document.getElementById('animationContainer'), // the dom element
        renderer: 'svg',
        loop: true,
        autoplay: true,
        path: '../images/raw/glassvoice/arrow.json' // the path to the animation json
    });
});
</script>
</html>
